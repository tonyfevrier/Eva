# Configuration H2 pour les tests
spring.application.name=eva-test
spring.config.import=optional:file:./.env[.properties]
spring.h2.console.enabled=true

# Base de données H2 en mémoire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA pour H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Initialisation des données pour les tests
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Logging pour les tests
logging.level.root = ERROR
logging.level.com.openclassrooms = INFO
logging.level.org.springframework.boot.web.embedded.tomcat = INFO

# Répertoires d'import/export pour les tests
app.xls-data-model-dir=target/test-imports/modeles
app.xls-data-dir=target/test-imports
app.pdf-dir=target/test-imports
app.generated-pdf-dir=target/test-imports
app.libreoffice.enabled=false

# Désactiver le health check mail (JavaMailSender est mocké dans les tests)
management.health.mail.enabled=false

# Clé JWT pour les tests (même que en dev)
jwt.secret.key=${JWT_SECRET_KEY}