spring.application.name=backend 
server.port = 9000

# Configuration MySQL pour production
spring.datasource.url=jdbc:mysql://localhost:3306/eva_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=eva_user
spring.datasource.password=eva_pwd

# JPA pour MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initialisation des données
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Logging
logging.level.root = ERROR
logging.level.com.openclassrooms = INFO
logging.level.org.springframework.boot.web.embedded.tomcat = INFO

# Désactiver le rapport d'autoconfiguration au démarrage
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF
debug=false

# Configuration pour l'envoi de mails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply.eva.application@gmail.com
spring.mail.password=ntkgtipwedidzcsv
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true